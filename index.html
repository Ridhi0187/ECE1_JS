<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment6</title>
    <link rel="stylesheet" href="style.css">    
</head>
<body>
    <div class="container">
        <h1 id="mainHeading">Welcome to JavaScript Lab</h1>
        <input type="text" id="input" placeholder="Enter new heading text">
        <br>
        <button id="changeTextBtn">Change Heading</button>
        <button id="bgColorBtn">Change Background</button>
        <button id="fontSizeBtn">Increase Font Size</button>
        <br>
        <button id="toggleBtn">Show/Hide Paragraph</button>
        <button id="resetBtn">Reset</button>
        <p id="paragraph">This is a sample paragraph. JavaScript events can dynamically change content.</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
